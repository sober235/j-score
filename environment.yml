name: jscore
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - cudatoolkit=11.3.1
  - cudnn=8.2.1
  - pytorch==1.13.0
  - torchvision==0.14.0
  - torchaudio==0.13.0
  - h5py
  - pip
  - pip:
    - absl-py>=0.10
    - mat73>=0.60
    - ml-collections>=0.1.0
    - numpy>=1.23
    - scipy>=1.9
    - scikit-image>=0.19
    - tensorboard>=2.4
    - tensorflow>=2.4
    - tensorflow-io
